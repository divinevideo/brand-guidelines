name: Bug Report
description: Report a documentation problem or regression
title: "fix: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Use generic descriptors instead of partner, customer, or brand names in public issue titles, bodies, and screenshots unless a maintainer explicitly approves naming them.
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
